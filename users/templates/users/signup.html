<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign Up - MusclePower.ks</title>

<style>
:root {
  --bg-page: #f3f6fb;
  --text-main: #1e293b;
  --surface: #ffffff;
  --surface-border: #dbe3f0;
  --input-bg: #ffffff;
  --input-border: #d1d9e8;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --error: #dc2626;
  --toggle-bg: #eef2ff;
  --toggle-border: #c7d2fe;
  --toggle-text: #1e3a8a;
}

body[data-theme="dark"] {
  --bg-page: #0b1220;
  --text-main: #dbe7ff;
  --surface: #101a2e;
  --surface-border: #223456;
  --input-bg: #13203a;
  --input-border: #2d446b;
  --accent: #60a5fa;
  --accent-hover: #3b82f6;
  --error: #f87171;
  --toggle-bg: #1b2a46;
  --toggle-border: #334e7a;
  --toggle-text: #dbe7ff;
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: var(--bg-page);
  color: var(--text-main);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.signup-container {
  background: var(--surface);
  padding: 40px 35px;
  border-radius: 12px;
  border: 1px solid var(--surface-border);
  box-shadow: 0 12px 26px rgba(0,0,0,0.16);
  width: 400px;
  text-align: center;
  position: relative;
}

.signup-container h2 {
  margin-bottom: 25px;
  color: var(--accent);
}

.signup-container input[type="text"],
.signup-container input[type="email"],
.signup-container input[type="password"] {
  width: 90%;
  padding: 12px 15px;
  margin: 10px 0;
  border: 1px solid var(--input-border);
  background: var(--input-bg);
  color: var(--text-main);
  border-radius: 8px;
  font-size: 14px;
  transition: 0.3s;
}

.signup-container input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(37,99,235,0.2);
  outline: none;
}

.signup-container .btn-signup {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background-color: var(--accent);
  color: #fff;
  font-weight: 500;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}

.signup-container .btn-signup:hover {
  background-color: var(--accent-hover);
}

.signup-container .login-link {
  margin-top: 20px;
  font-size: 14px;
}

.signup-container .login-link a {
  color: var(--accent);
  text-decoration: none;
  font-weight: 500;
  transition: 0.3s;
}

.signup-container .login-link a:hover {
  color: var(--accent-hover);
}

.error-text {
  color: var(--error);
  list-style: none;
  padding: 0;
  margin: 8px 0 0;
}

.theme-toggle {
  position: absolute;
  top: 12px;
  right: 12px;
  border: 1px solid var(--toggle-border);
  background: var(--toggle-bg);
  color: var(--toggle-text);
  border-radius: 8px;
  width: 36px;
  height: 36px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: 0.2s ease;
}

.theme-toggle:hover { transform: translateY(-1px); }

.theme-icon {
  position: absolute;
  width: 18px;
  height: 18px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: opacity 0.25s ease, transform 0.25s ease;
}

.theme-icon-sun { opacity: 0; transform: rotate(-35deg) scale(0.7); }
.theme-icon-moon { opacity: 1; transform: rotate(0deg) scale(1); }
body[data-theme="dark"] .theme-icon-sun { opacity: 1; transform: rotate(0deg) scale(1); }
body[data-theme="dark"] .theme-icon-moon { opacity: 0; transform: rotate(35deg) scale(0.7); }

.signup-container .login-link {
  margin-top: 20px;
  font-size: 14px;
}
</style>
</head>
<body>

<div class="signup-container">
  <button type="button" id="themeToggle" class="theme-toggle" aria-label="Toggle theme" title="Toggle theme">
    <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"></path>
    </svg>
    <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="12" r="4"></circle>
      <path d="M12 2v2"></path><path d="M12 20v2"></path>
      <path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path>
      <path d="M2 12h2"></path><path d="M20 12h2"></path>
      <path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path>
    </svg>
  </button>
  <h2>Sign Up</h2>
    <form method="POST" action="{% url 'users:signup' %}" method="POST">
    {% csrf_token %}

    <input type="email" name="email" placeholder="Email" required>
      {% if email_error %}
<li class="error-text">{{ email_error }}</li>
{% endif %}
    <input type="password" name="password" placeholder="Password" required>
    <input type="password" name="password_confirm" placeholder="Confirm Password" required>
      {% if password_error %}
<li class="error-text">{{ password_error }}</li>
{% endif %}
    <button type="submit" class="btn-signup">Sign Up</button>
  </form>
  <div class="login-link">
    Already have an account? <a href="{% url 'users:login' %}">Login</a>
  </div>
</div>

<script>
  (function () {
    const THEME_KEY = 'musclepower-theme';
    const body = document.body;
    const toggleBtn = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem(THEME_KEY) || 'dark';
    body.setAttribute('data-theme', savedTheme);

    if (toggleBtn) {
      toggleBtn.addEventListener('click', function () {
        const currentTheme = body.getAttribute('data-theme') || 'dark';
        const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
        body.setAttribute('data-theme', nextTheme);
        localStorage.setItem(THEME_KEY, nextTheme);
      });
    }
  })();
</script>

</body>
</html>
