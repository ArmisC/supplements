{% extends 'base.html' %}

{% block content %}

{% block banner %}{% endblock %}

<style>
/* Style per Create Product Form */
.create-product-container {
  max-width: 700px;
  margin: 50px auto;
  background: #ffffff;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.05);
}

.create-product-container h2 {
  margin-bottom: 25px;
  color: #0077b6;
  text-align: center;
}

.create-product-container .form-group {
  margin-bottom: 18px;
}

.create-product-container label {
  display: block;
  margin-bottom: 6px;
  font-weight: 500;
  color: #333;
}

.create-product-container input[type="text"],
.create-product-container input[type="number"],
.create-product-container input[type="file"],
.create-product-container select,
.create-product-container textarea {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 14px;
  transition: 0.3s;
}

.create-product-container input:focus,
.create-product-container select:focus,
.create-product-container textarea:focus {
  outline: none;
  border-color: #0077b6;
  box-shadow: 0 0 6px rgba(0,119,182,0.3);
}

.create-product-container button[type="submit"] {
  display: block;
  width: 100%;
  padding: 12px;
  background-color: #0077b6;
  color: #fff;
  font-weight: 600;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.create-product-container button[type="submit"]:hover {
  background-color: #005f8a;
}
</style>

<div class="create-product-container">
  <h2>Create New Product</h2>
  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <!-- Image -->
    <div class="form-group">
      <label for="id_image">Product Image:</label>
      <input type="file" name="image" id="id_image">
    </div>

    <!-- Name -->
    <div class="form-group">
      <label for="id_name">Product Name:</label>
      <input type="text" name="name" id="id_name" placeholder="Product Name" required>
    </div>

    <!-- Category -->
    <div class="form-group">
  <label for="id_category">Category:</label>
  <select name="category" id="id_category" required>
    <option value="Protein">Protein</option>
    <option value="Creatine">Creatine</option>
    <option value="Vitamin">Vitamin</option>
    <option value="Pre Workout">Pre Workout</option>
    <option value="Fat Burner">Fat Burner</option>
    <option value="Gainers">Gainers</option>
    <option value="Amino Acids">Amino Acids</option>
    <option value="Collagen">Collagen</option>
    <option value="Testosteron Booster">Testosteron Booster</option>
    <option value="Accessories">Accessories</option>
    <option value="Weight Loss">Weight Loss</option>
  </select>
</div>

    <!-- Brand -->
    <div class="form-group">
      <label for="id_brand">Brand:</label>
      <input type="text" name="brand" id="id_brand" placeholder="Brand" required>
    </div>

    <!-- Description -->
    <div class="form-group">
      <label for="id_description">Description:</label>
      <textarea name="description" id="id_description" rows="4" placeholder="Product Description" required></textarea>
    </div>

    <!-- Price -->
    <div class="form-group">
      <label for="id_price">Price (€):</label>
      <input type="number" name="price" id="id_price" step="0.01" required>
    </div>

    <!-- Stock -->
    <div class="form-group">
      <label for="id_stock">Stock Quantity:</label>
      <input type="number" name="stock" id="id_stock" required>
    </div>

    <!-- Weight -->
    <div class="form-group">
      <label for="id_weight">Weight (grams/kilograms):</label>
      <input type="number" name="weight" id="id_weight" step="0.01">
    </div>

    <!-- Flavor -->
    <div class="form-group">
      <label for="id_flavor">Flavor:</label>
      <input type="text" name="flavor" id="id_flavor" placeholder="Flavor">
    </div>

    <!-- Submit -->
    <button type="submit">Create Product</button>
  </form>
</div>
{% endblock %}
