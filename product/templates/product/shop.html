{% extends 'base.html' %}

{% block content %}

{% block banner %}{% endblock %}

<style>
.shop-wrap {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
}

/* Products list */
.products-container {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* Secili produkt si rresht horizontal */
.product-row {
  display: flex;
  background: var(--surface-primary);
  border: 1px solid var(--border-soft);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0,0,0,0.14);
  transition: 0.3s;
}

.product-row:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

/* Fotoja në anën e majtë */
.product-image img {
  width: 200px;
  height: 200px;
  object-fit: cover;
  border-right: 1px solid var(--border-soft);
}

/* Të dhënat në të djathtë */
.product-info {
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.product-info h3 {
  margin: 0 0 10px 0;
  color: var(--accent);
  font-size: 18px;
}

.product-info p {
  margin: 4px 0;
  color: var(--text-muted);
  font-size: 14px;
}
</style>

<div class="shop-wrap">
  <h1 style="color:var(--accent); margin-bottom: 25px;">All Products</h1>

  <div class="products-container">
    {% for product in products %}
    <div class="product-row">
      <div class="product-image">
        <img src="{{ product.image.url }}" alt="{{ product.name }}">
      </div>
      <div class="product-info">
        <h3>{{ product.name }}</h3>
        <p><strong>Category:</strong> {{ product.category }}</p>
        <p><strong>Brand:</strong> {{ product.brand }}</p>
        <p><strong>Price:</strong> {{ product.price }} €</p>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
