{% extends 'base.html' %}
{% block title %}Goals{% endblock %}

{% block content %}

<style>
.goals-container {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 25px;
    margin-top: 30px;
}

.goal-card {
    text-align: center;
    text-decoration: none;
    color: inherit;
}

.goal-card img {
    width: 90%;
    height: 400px;
    object-fit: cover;
    border-radius: 12px;
    transition: 0.3s ease;
}

.goal-card img:hover {
    transform: scale(1.05);
    opacity: 0.9;
}

.goal-title {
    margin-top: 10px;
    font-weight: 600;
    font-size: 16px;
    color: var(--text-main);
}

h1 {
    color: var(--accent);
    margin-bottom: 20px;
}

@media (max-width: 1100px) {
    .goals-container {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 700px) {
    .goals-container {
        grid-template-columns: 1fr;
        gap: 16px;
    }

    .goal-card img {
        width: 100%;
        height: 280px;
    }
}
</style>

<h1>Cili eshte qellimi juaj</h1>

<div class="goals-container">

    <a href="#" class="goal-card">
        <img src="/media/products/r.png" alt="Shtim peshe">
        <div class="goal-title">Shtim peshe</div>
    </a>

    <a href="#" class="goal-card">
        <img src="/media/products/t.png" alt="Humbje peshe">
        <div class="goal-title">Humbje peshe</div>
    </a>

    <a href="#" class="goal-card">
        <img src="/media/products/y.png" alt="Zhvillim performance">
        <div class="goal-title">Zhvillim performance</div>
    </a>

    <a href="#" class="goal-card">
        <img src="/media/products/u.png" alt="Shendet dhe mirqenie">
        <div class="goal-title">Shendet dhe mirqenie</div>
    </a>

</div>

{% block banner %}{% endblock %}
{% endblock %}
