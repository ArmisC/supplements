{% extends 'base.html' %}
{% block title %}Update Product{% endblock %}

{% block banner %}{% endblock %}

{% block content %}
    <style>
        .update-wrap {
            max-width: 700px;
            margin: 40px auto;
            background-color: var(--surface-primary);
            border: 1px solid var(--border-soft);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 24px rgba(0,0,0,0.14);
        }

        .update-wrap h1 {
            text-align: center;
            color: var(--accent);
            margin-top: 0;
            margin-bottom: 24px;
        }

        .update-wrap label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        .update-wrap input[type="text"],
        .update-wrap input[type="number"],
        .update-wrap input[type="file"],
        .update-wrap textarea,
        .update-wrap select {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid var(--border-soft);
            border-radius: 8px;
            font-size: 14px;
            background: var(--input-bg);
            color: var(--text-main);
        }

        .update-wrap textarea {
            resize: vertical;
            min-height: 80px;
        }

        .update-wrap button {
            background-color: var(--accent);
            color: #fff;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            font-weight: 600;
        }

        .update-wrap button:hover {
            background-color: var(--accent-hover);
        }

        .update-wrap img {
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-soft);
            background: var(--surface-secondary);
        }
    </style>

    <div class="update-wrap">
    <h1>Update Product</h1>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <label for="name">Name:</label>
        <input type="text" id="name" name="name" value="{{ producti.name }}">

        <label for="id_category">Category:</label>
        <select name="category" id="id_category" required>
          <option value="Protein" {% if producti.category == "Protein" %}selected{% endif %}>Protein</option>
          <option value="Creatine" {% if producti.category == "Creatine" %}selected{% endif %}>Creatine</option>
          <option value="Vitamin" {% if producti.category == "Vitamin" %}selected{% endif %}>Vitamin</option>
          <option value="Pre Workout" {% if producti.category == "Pre Workout" %}selected{% endif %}>Pre Workout</option>
          <option value="Fat Burner" {% if producti.category == "Fat Burner" %}selected{% endif %}>Fat Burner</option>
          <option value="Gainers" {% if producti.category == "Gainers" %}selected{% endif %}>Gainers</option>
          <option value="Amino Acids" {% if producti.category == "Amino Acids" %}selected{% endif %}>Amino Acids</option>
          <option value="Collagen" {% if producti.category == "Collagen" %}selected{% endif %}>Collagen</option>
          <option value="Testosteron Booster" {% if producti.category == "Testosteron Booster" %}selected{% endif %}>Testosteron Booster</option>
          <option value="Accessories" {% if producti.category == "Accessories" %}selected{% endif %}>Accessories</option>
          <option value="Weight Loss" {% if producti.category == "Weight Loss" %}selected{% endif %}>Weight Loss</option>
        </select>

        <label for="brand">Brand:</label>
        <input type="text" id="brand" name="brand" value="{{ producti.brand }}">

        <label for="description">Description:</label>
        <textarea id="description" name="description">{{ producti.description }}</textarea>

        <label for="price">Price:</label>
        <input type="number" id="price" name="price" step="0.01" value="{{ producti.price }}">

        <label for="stock">Stock:</label>
        <input type="number" id="stock" name="stock" value="{{ producti.stock }}">

        <label for="weight">Weight:</label>
        <input type="text" id="weight" name="weight" value="{{ producti.weight }}">

        <label for="flavor">Flavor:</label>
        <input type="text" id="flavor" name="flavor" value="{{ producti.flavor }}">

        <label for="discount_percent">Discount (%)</label>
        <input type="number" id="discount_percent" name="discount_percent" min="0" max="100" step="1" value="{{ producti.discount_percent|default:0 }}">

        <label for="image">Image:</label>
        {% if producti.image %}
            <img src="{{ producti.image.url }}" alt="Current Image" width="150">
        {% endif %}
        <input type="file" id="image" name="image">

        <button type="submit">Update Product</button>
    </form>
    </div>
{% endblock %}

{% block side %}{% endblock %}
